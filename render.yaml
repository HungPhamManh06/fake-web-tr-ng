services:
  - type: web
    name: fake-web-truong-api
    runtime: node
    rootDir: backend
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CORS_ORIGIN
        sync: false
      - key: DATA_DIR
        value: /var/data
    disk:
      name: student-data
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: fake-web-truong-ui
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false